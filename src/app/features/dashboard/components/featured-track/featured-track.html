<article class="featured-track">
  <div class="track-header">
    <div class="track-meta">
      <span class="track-badge">Featured Track</span>
      <span class="priority-badge">High Impact</span>
    </div>
  </div>

  <div class="track-body">
    <h2>DSA Interview Sprint</h2>

    <p class="track-description">
      A focused learning path with company-style arrays, trees, and graph problems built for interview confidence.
    </p>

    <ul class="track-features">
      <li>120 curated problems</li>
      <li>4-week structured plan</li>
      <li>Beginner to advanced</li>
    </ul>

    <button class="btn-start" (click)="startTrack()">
      Start Structured Practice
    </button>
  </div>
</article>
