<mat-card class="featured-track">
  <div class="track-header">
    <span class="track-badge">Featured Track</span>
    <span class="priority-pill">High Impact</span>
  </div>

  <div class="track-content">
    <h3>DSA Interview Sprint</h3>

    <p class="track-desc">
      A focused path with company-style arrays, trees, and graph problems built for interview confidence.
    </p>

    <div class="track-meta">
      <span>120 curated problems</span>
      <span>4-week plan</span>
      <span>Beginner to advanced</span>
    </div>

    <button mat-raised-button color="primary" (click)="startTrack()">
      Start Structured Practice
    </button>
  </div>
</mat-card>
