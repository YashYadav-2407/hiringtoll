<article class="participation-home-card">
  <div class="card-copy">
    <p class="eyebrow">Participation Tool</p>
    <h3>Explore hackathons, contests, and tech events</h3>
    <p class="subtitle">
      Discover opportunities from Unstop, Devfolio, MLH, and HackerEarth, then apply directly from your platform.
    </p>

    <div class="card-metrics">
      <span>40+ live events</span>
      <span>Smart filters</span>
      <span>Saved & applied tracking</span>
    </div>
  </div>

  <div class="card-cta">
    <button type="button" class="btn-open" (click)="openParticipationTool()">
      Open Participation Dashboard
    </button>
  </div>
</article>
