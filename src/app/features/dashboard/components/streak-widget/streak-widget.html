<mat-card class="streak-card">

  <div class="streak-header">
    <span class="fire" [matTooltip]="isLoggedInToday ? 'Logged in today!' : 'Not logged in yet today'">🔥</span>
    <h3>Your Coding Streak</h3>
  </div>

  <div class="streak-stats">
    <div class="stat">
      <span class="stat-label">Current</span>
      <span class="stat-value">{{ streak }}</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-label">Best</span>
      <span class="stat-value">{{ bestStreak }}</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-label">Goal</span>
      <span class="stat-value">{{ target }}</span>
    </div>
  </div>

  <p class="streak-text">
    Build your habit. Code every day without breaking the chain.
  </p>

  <div class="streak-progress">
    <div class="progress-bar">
      <div class="progress-fill" [style.width.%]="progressPercentage" 
           [class.goal-reached]="streak >= target"></div>
    </div>
    <span class="progress-label">{{ progressPercentage | number:'1.0-0' }}% completed</span>
  </div>

  <div class="streak-info" *ngIf="lastLoginDate">
    <span class="info-text">Last login: {{ lastLoginDate }}</span>
  </div>

  <div class="button-group">
    <button mat-stroked-button (click)="logProgress()" 
            [disabled]="isLoggedInToday"
            [matTooltip]="isLoggedInToday ? 'Already logged in today' : 'Mark today as active'"
            class="log-btn">
      {{ isLoggedInToday ? '✓ Logged In Today' : 'Log Today\'s Progress' }}
    </button>
    <button mat-icon-button 
            matTooltip="Reset streak counter"
            (click)="resetStreak()"
            class="reset-btn">
      ↻
    </button>
  </div>

</mat-card>
