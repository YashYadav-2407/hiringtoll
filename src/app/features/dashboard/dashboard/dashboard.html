<app-header></app-header>

<div class="dashboard">
  <section class="welcome-section">
    <app-welcome-card></app-welcome-card>
  </section>

  <section class="dashboard-intro">
    <div>
      <p class="eyebrow">Workspace Overview</p>
      <h1>Interview Preparation Dashboard</h1>
      <p class="subtitle">
        Track your consistency, plan focused tasks, and progress through structured interview prep.
      </p>
    </div>
    <div class="summary-strip">
      <div class="summary-item">
        <span class="label">Focus Area</span>
        <strong>DSA + System Design</strong>
      </div>
      <div class="summary-item">
        <span class="label">Mode</span>
        <strong>Daily Practice</strong>
      </div>
      <div class="summary-item">
        <span class="label">Target</span>
        <strong>Hiring Ready</strong>
      </div>
    </div>

    <nav class="dashboard-tabs" aria-label="Dashboard sections" role="tablist">
      <button
        *ngFor="let tab of tabs"
        type="button"
        class="tab-pill"
        role="tab"
        [class.active]="isActiveTab(tab.id)"
        [attr.aria-selected]="isActiveTab(tab.id)"
        [attr.aria-controls]="tab.id + '-panel'"
        [id]="tab.id + '-tab'"
        (click)="setActiveTab(tab.id)"
      >
        {{ tab.label }}
      </button>
    </nav>
  </section>

  <section
    *ngIf="isActiveTab('focus')"
    class="info-section single-panel"
    id="focus-panel"
    role="tabpanel"
    aria-labelledby="focus-tab"
  >
    <div>
      <app-featured-track></app-featured-track>
    </div>
  </section>

  <section
    *ngIf="isActiveTab('streak')"
    class="info-section single-panel"
    id="streak-panel"
    role="tabpanel"
    aria-labelledby="streak-tab"
  >
    <div>
      <app-streak-widget></app-streak-widget>
    </div>
  </section>

  <section
    *ngIf="isActiveTab('planner')"
    class="schedule-section"
    id="planner-panel"
    role="tabpanel"
    aria-labelledby="planner-tab"
  >
    <app-calendar-todo></app-calendar-todo>
  </section>

</div>

<app-footer></app-footer>
