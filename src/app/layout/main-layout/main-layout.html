<div class="layout-container">
  <aside class="sidenav" *ngIf="!showSidenav()">
    <button class="sidenav-brand" type="button" (click)="openProfilePage()" aria-label="Open profile page">
      <div class="brand-head">
        <span class="brand-mark">HT</span>
        <div class="brand-text">
          <strong>Hiring Tool</strong>
          <small>Career Prep Platform</small>
        </div>
      </div>

      <div class="profile-strip">
        <div class="profile-avatar-shell">
          <img
            class="profile-avatar"
            [src]="sidebarProfile.avatar"
            [alt]="sidebarProfile.name + ' avatar'"
            (error)="onSidebarAvatarError($event)"
          />
        </div>
        <div class="profile-meta">
          <strong>{{ sidebarProfile.name }}</strong>
          <small>{{ sidebarProfile.subtitle }}</small>
        </div>
        <mat-icon class="profile-cta" aria-hidden="true">arrow_forward_ios</mat-icon>
      </div>
    </button>

    <p class="sidenav-caption">Main Navigation</p>

    <nav class="sidenav-nav">
      <a routerLink="/dashboard" routerLinkActive="active">
        <mat-icon>home</mat-icon>
        Home
      </a>

      <a routerLink="/learn" routerLinkActive="active">
        <mat-icon>menu_book</mat-icon>
        Learn
      </a>

      <a routerLink="/practice" routerLinkActive="active">
        <mat-icon>code</mat-icon>
        Practice
      </a>

      <a routerLink="/assess" routerLinkActive="active">
        <mat-icon>assignment</mat-icon>
        Assess
      </a>

      <a routerLink="/typing" routerLinkActive="active">
        <mat-icon>keyboard</mat-icon>
        Typing Tool
      </a>

      <a routerLink="/participation" routerLinkActive="active">
        <mat-icon>event_available</mat-icon>
        Participation Tool
      </a>
    </nav>

    <div class="sidenav-bottom">
      <div class="support-note">
        <mat-icon>verified</mat-icon>
        <span>Stay consistent and interview ready.</span>
      </div>

      <a class="logout" (click)="logout()" role="button">
        <mat-icon>logout</mat-icon>
        Logout
      </a>
    </div>
  </aside>

  <main class="page-content">
    <router-outlet></router-outlet>
  </main>
</div>
