<header class="app-header">
  <div class="header-container">
    <div class="header-left">
      <nav class="app-switch" aria-label="Application switcher">
        <a
          class="switch-item"
          routerLink="/dashboard"
          [routerLinkActiveOptions]="{ exact: true }"
          routerLinkActive="active"
        >
          Learning Tool
        </a>
        <a
          class="switch-item"
          href="https://hiringtoll2-0-client.onrender.com/"
          rel="noopener noreferrer"
        >
          Interview Tool
        </a>
        <a
          class="switch-item"
          routerLink="/participation"
          routerLinkActive="active"
        >
          Participation Tool
        </a>
      </nav>

      <nav class="header-nav" aria-label="Primary">
        <a class="nav-item" routerLink="/dashboard" routerLinkActive="active">
          <mat-icon aria-hidden="true">space_dashboard</mat-icon>
          <span>Dashboard</span>
        </a>

        <a class="nav-item" routerLink="/learn" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <mat-icon aria-hidden="true">menu_book</mat-icon>
          <span>Learn</span>
        </a>

        <a class="nav-item" routerLink="/practice" routerLinkActive="active">
          <mat-icon aria-hidden="true">code</mat-icon>
          <span>Practice</span>
        </a>

        <a class="nav-item" routerLink="/assess" routerLinkActive="active">
          <mat-icon aria-hidden="true">task_alt</mat-icon>
          <span>Assess</span>
        </a>

        <a class="nav-item" routerLink="/typing" routerLinkActive="active">
          <mat-icon aria-hidden="true">keyboard</mat-icon>
          <span>Typing</span>
        </a>
      </nav>
    </div>

    <div class="header-right">
      <a class="profile-avatar" routerLink="/profile" aria-label="Open profile">
        <mat-icon>account_circle</mat-icon>
        <span>Profile</span>
      </a>
    </div>
  </div>
</header>
